name: Validate Taxonomies

on:
  pull_request:
    paths:
      - '**/machinetag.json'
      - 'schema/**'
      - 'galaxies/**'
      - 'clusters/**'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install jsonschema
      - run: python tools/validate.py
      - run: python tools/machinetag.py --all
